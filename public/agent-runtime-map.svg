<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" fill="none">
  <rect width="1200" height="720" rx="32" fill="#F5F8FF"/>
  <rect x="60" y="60" width="1080" height="600" rx="28" fill="white" stroke="#D7E3FF" stroke-width="2"/>
  <text x="96" y="128" fill="#0F172A" font-family="Arial, sans-serif" font-size="44" font-weight="700">AI runtime map for support, research, and agent operations</text>
  <text x="96" y="166" fill="#475569" font-family="Arial, sans-serif" font-size="24">Use synchronous responses for immediate work, background mode for long-running jobs, and approval boundaries before tools can create side effects.</text>

  <rect x="96" y="232" width="300" height="150" rx="20" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="122" y="278" fill="#1D4ED8" font-family="Arial, sans-serif" font-size="26" font-weight="700">Interactive lane</text>
  <text x="122" y="318" fill="#1E293B" font-family="Arial, sans-serif" font-size="22">Low-latency user turn</text>
  <text x="122" y="350" fill="#1E293B" font-family="Arial, sans-serif" font-size="22">Short tool calls</text>

  <rect x="450" y="232" width="300" height="150" rx="20" fill="#EEFDF5" stroke="#6EE7B7" stroke-width="2"/>
  <text x="476" y="278" fill="#047857" font-family="Arial, sans-serif" font-size="26" font-weight="700">Background lane</text>
  <text x="476" y="318" fill="#1E293B" font-family="Arial, sans-serif" font-size="22">Document transforms</text>
  <text x="476" y="350" fill="#1E293B" font-family="Arial, sans-serif" font-size="22">Long-running research</text>

  <rect x="804" y="232" width="300" height="150" rx="20" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>
  <text x="830" y="278" fill="#C2410C" font-family="Arial, sans-serif" font-size="26" font-weight="700">Approval lane</text>
  <text x="830" y="318" fill="#1E293B" font-family="Arial, sans-serif" font-size="22">Writes and side effects</text>
  <text x="830" y="350" fill="#1E293B" font-family="Arial, sans-serif" font-size="22">User or operator review</text>

  <path d="M396 307H450" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>
  <path d="M750 307H804" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>
  <path d="M430 307L408 293V321L430 307Z" fill="#94A3B8"/>
  <path d="M784 307L762 293V321L784 307Z" fill="#94A3B8"/>

  <rect x="96" y="446" width="1008" height="148" rx="20" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="126" y="490" fill="#0F172A" font-family="Arial, sans-serif" font-size="28" font-weight="700">Decision rule</text>
  <text x="126" y="530" fill="#334155" font-family="Arial, sans-serif" font-size="22">If the task must finish within a live session, stay interactive. If it can run for minutes, queue it in background mode. If it can change systems, money, or customer state, add an approval boundary.</text>
</svg>
